version: '3.8'

services:
  chigua:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chigua-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/data/chigua/chigua.db
    env_file:
      - .env.local
    restart: unless-stopped
    volumes:
      # 持久化SQLite数据库
      - chigua_data:/data/chigua
      # 防止覆盖容器内的node_modules
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/chigua-api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  chigua_data:
