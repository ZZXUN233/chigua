# Nginx 配置片段：/chigua 和 /chigua-api 路径转发到本机 3000 端口
# 将此配置添加到现有 Nginx 配置的 server 块中

# 处理 /chigua 路径（不带斜杠）重定向到 /chigua/
location = /chigua {
    return 301 /chigua/;
}

# /chigua/ 路径下的所有请求转发到后端（前端静态资源和 SPA 路由）
location /chigua/ {
    # 代理到本机 3000 端口（注意尾部斜杠很重要！）
    proxy_pass http://127.0.0.1:3000/chigua/;

    # 基本代理头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket 支持
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 超时设置
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # 禁用代理重定向
    proxy_redirect off;

    # 允许较大的请求体（用于图片上传）
    client_max_body_size 10M;
}

# /chigua-api 路径下的所有请求转发到后端（API 接口）
location /chigua-api/ {
    # 代理到本机 3000 端口
    proxy_pass http://127.0.0.1:3000/chigua-api/;

    # 基本代理头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API 特定的超时设置
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # 禁用代理重定向
    proxy_redirect off;

    # 允许较大的请求体（用于图片上传）
    client_max_body_size 10M;

    # 添加 CORS 头（如果后端没有设置）
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
    add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
}

# 处理 OPTIONS 预检请求
location ~* /chigua-api/.* {
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
        add_header Access-Control-Max-Age 1728000;
        add_header Content-Type 'text/plain; charset=utf-8';
        add_header Content-Length 0;
        return 204;
    }
}

# 可选：为静态资源添加缓存
location ~* /chigua/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    # 这些请求也会被代理到后端，但可以添加缓存头
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 缓存头（由后端应用控制缓存）
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# ============================================
# 使用说明：
# 1. 将以上配置复制到你的 Nginx server 块中
# 2. 确保吃瓜大师应用正在 127.0.0.1:3000 运行
# 3. 重启 Nginx：sudo systemctl restart nginx
# 4. 访问测试：
#    - 前端应用：http://your-domain.com/chigua/
#    - 健康检查：http://your-domain.com/chigua-api/health
#    - 获取记录：GET http://your-domain.com/chigua-api/records
#
# 路径映射：
# 外部访问路径 (Nginx)          →   内部转发路径 (后端)
# http://domain.com/chigua/    →   http://localhost:3000/chigua/
# http://domain.com/chigua-api/* → http://localhost:3000/chigua-api/*
# ============================================
